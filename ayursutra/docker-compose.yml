version: '3.8'

services:
  # AyurSutra Backend + Frontend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ayursutra-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev_jwt_secret_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_in_production}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
